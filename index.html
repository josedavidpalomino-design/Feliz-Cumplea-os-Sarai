<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Made For Sarai 🎁</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #000; overflow: hidden; font-family: 'Pacifico', cursive; height: 100vh; }

        /* Capas de Fondo */
        #stars-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; opacity: 0; transition: opacity 2s; }
        #matrixCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; transition: opacity 1.5s; }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--duration) infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* Textos y Animación de Explosión */
        #textContainer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: #ff69b4; font-size: 80px; text-align: center; text-shadow: 0 0 30px #ff1493; opacity: 0; pointer-events: none; width: 100%; }
        .explode { animation: explodeAnim 0.8s forwards; }
        @keyframes explodeAnim {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; filter: blur(0); }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; filter: blur(10px); }
        }

        #bookCaption { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); z-index: 50; color: white; font-size: 28px; text-align: center; text-shadow: 2px 2px 10px #ff1493; opacity: 0; transition: opacity 0.5s; width: 90%; display: none; font-family: 'Dancing Script', cursive; }

        /* Libro 3D con Portada Bonita */
        #bookContainer { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); z-index: 20; width: 300px; height: 400px; perspective: 2000px; display: none; opacity: 0; transition: opacity 1.5s; }
        .page { width: 100%; height: 100%; position: absolute; transform-origin: left center; transform-style: preserve-3d; transition: transform 1.2s cubic-bezier(0.645, 0.045, 0.355, 1); cursor: pointer; }
        .page.flipped { transform: rotateY(-180deg); }
        .front, .back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border: 4px solid #fff; border-radius: 5px 15px 15px 5px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .back { transform: rotateY(180deg); border-radius: 15px 5px 5px 15px; }
        
        /* Estilo Portada */
        .cover-front { background: linear-gradient(135deg, #ff1493, #ff69b4); color: gold; flex-direction: column; border: 5px solid #ffd700; }
        .cover-front h2 { font-size: 40px; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .page img { width: 100%; height: 100%; object-fit: cover; }

        /* Corazón Final */
        #heartGallery { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 100; width: 100%; height: 100%; display: none; animation: heartbeat 1.5s infinite; }
        .heart-pic { position: absolute; top: 50%; left: 50%; width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 0 20px #ff69b4; transform: translate(-50%, -50%) scale(0); opacity: 0; transition: all 0.8s; }
        @keyframes heartbeat { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.05); } }
        
        #clickHint { position: absolute; bottom: 40px; width: 100%; text-align: center; color: white; z-index: 60; font-family: 'Dancing Script', cursive; font-size: 24px; animation: pulse 2s infinite; cursor: pointer; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="stars-container"></div>
    <canvas id="matrixCanvas"></canvas>
    <div id="textContainer"></div>
    <div id="clickHint">Un regalo para ti... Toca aquí 💖</div>
    <div id="bookCaption">Tengo algo para decirte...</div>

    <div id="bookContainer">
        <div class="page" id="p4" style="z-index: 1;"><div class="front"><img src="foto5.jpg"></div><div class="back"><img src="foto6.jpg"></div></div>
        <div class="page" id="p3" style="z-index: 2;"><div class="front"><img src="foto3.jpg"></div><div class="back"><img src="foto4.jpg"></div></div>
        <div class="page" id="p2" style="z-index: 3;"><div class="front"><img src="foto1.jpg"></div><div class="back"><img src="foto2.jpg"></div></div>
        <div class="page" id="p1" style="z-index: 4;">
            <div class="front cover-front">
                <p style="font-size: 20px; color: white;">Para:</p>
                <h2>Sarai</h2>
                <p style="font-size: 50px;">🎁</p>
            </div>
            <div class="back" style="background: #fff;"><img src="foto1.jpg"></div>
        </div>
    </div>

    <div id="heartGallery"></div>
    <audio id="birthdayAudio" src="Happybirthday.mp3" loop></audio>

    <script>
        // 1. ESTRELLAS
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 'px';
            star.style.width = size; star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
            starsContainer.appendChild(star);
        }

        // 2. CASCADA
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const phrase = "FELIZCUMPLEAÑOSSARAI❤️";
        const fontSize = 18;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4";
            ctx.font = fontSize + "px arial";
            for (let i = 0; i < drops.length; i++) {
                const text = phrase[drops[i] % phrase.length];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        let matrixInterval = setInterval(drawMatrix, 50);

        // 3. SECUENCIA PALABRA POR PALABRA + EXPLOSIÓN
        let isStarted = false;
        document.addEventListener('click', function() {
            if (isStarted) return;
            isStarted = true;
            document.getElementById('clickHint').style.display = 'none';
            document.getElementById('birthdayAudio').play();
            
            let container = document.getElementById('textContainer');
            let sequence = ["¡FELIZ", "CUMPLEAÑOS", "SARAI ❤️!"];
            let idx = 0;

            function showNextWord() {
                if (idx < sequence.length) {
                    container.innerText = sequence[idx];
                    container.style.opacity = 1;
                    container.style.transition = "opacity 0.5s";
                    
                    setTimeout(() => {
                        if (idx === sequence.length - 1) {
                            // EFECTO EXPLOSIÓN en la última palabra
                            container.classList.add('explode');
                            setTimeout(() => {
                                document.getElementById('matrixCanvas').style.opacity = 0;
                                document.getElementById('stars-container').style.opacity = 1;
                                setTimeout(() => {
                                    clearInterval(matrixInterval);
                                    showBook();
                                }, 1000);
                            }, 800);
                        } else {
                            container.style.opacity = 0;
                            idx++;
                            setTimeout(showNextWord, 400);
                        }
                    }, 1200);
                }
            }
            showNextWord();
        });

        function showBook() {
            const book = document.getElementById('bookContainer');
            const caption = document.getElementById('bookCaption');
            book.style.display = 'block';
            caption.style.display = 'block';
            setTimeout(() => { book.style.opacity = 1; caption.style.opacity = 1; }, 100);
        }

        // 4. LÓGICA DEL LIBRO
        const frases = ["Algo para ti...", "Nuestros momentos...", "Gracias por estar...", "Eres increíble...", "¡Feliz Cumpleaños! ❤️"];
        const pages = [document.getElementById('p1'), document.getElementById('p2'), document.getElementById('p3'), document.getElementById('p4')];
        
        pages.forEach((page, index) => {
            page.onclick = (e) => {
                e.stopPropagation();
                if (page.classList.contains('flipped')) return;
                page.classList.add('flipped');
                setTimeout(() => { page.style.zIndex = index; }, 600);

                let cap = document.getElementById('bookCaption');
                cap.style.opacity = 0;
                setTimeout(() => {
                    cap.innerText = frases[index + 1];
                    cap.style.opacity = 1;
                    if(index === 3) setTimeout(createFinalHeart, 2500);
                }, 500);
            };
        });

        // 5. CORAZÓN
        function createFinalHeart() {
            document.getElementById('bookContainer').style.opacity = 0;
            document.getElementById('bookCaption').style.opacity = 0;
            setTimeout(() => {
                document.getElementById('bookContainer').style.display = 'none';
                const gallery = document.getElementById('heartGallery');
                gallery.style.display = 'block';
                const photos = ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg", "foto6.jpg"];
                const totalPics = 45; 
                for (let i = 0; i < totalPics; i++) {
                    let img = document.createElement('img');
                    img.src = photos[i % photos.length];
                    img.className = 'heart-pic';
                    gallery.appendChild(img);
                    let t = (i / totalPics) * Math.PI * 2;
                    let r = 18;
                    let x = 16 * Math.pow(Math.sin(t), 3) * r;
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * r;
                    setTimeout(() => {
                        img.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1)`;
                        img.style.opacity = 1;
                    }, i * 50);
                }
            }, 1000);
        }
    </script>
</body>
</html>
