<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Cumpleaños Sarai 🎁</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: black; overflow: hidden; font-family: 'Pacifico', cursive;
        }
        /* Lluvia de letras */
        #matrixCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        /* Texto animado principal */
        #textContainer {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 10; color: #ff69b4; font-size: 80px; text-align: center;
            text-shadow: 0 0 20px #ff1493, 0 0 40px #ff1493;
            opacity: 0; transition: opacity 0.5s ease-in-out;
        }
        /* Textos sobre el libro */
        #bookCaption {
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            z-index: 25; color: white; font-size: 35px; text-align: center;
            text-shadow: 2px 2px 10px #ff1493; opacity: 0; transition: opacity 0.5s;
            width: 90%; display: none;
        }
        /* Estilos del libro 3D */
        #bookContainer {
            position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
            z-index: 20; width: 280px; height: 380px; perspective: 1500px;
            display: none;
        }
        .page {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            transform-origin: left center; transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
            cursor: pointer; border-radius: 5px 15px 15px 5px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
        }
        .page.flipped { transform: rotateY(-180deg); }
        .front, .back {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            backface-visibility: hidden; background-color: white;
            border: 2px solid #ffb6c1; border-radius: 5px 15px 15px 5px; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .back { transform: rotateY(180deg); border-radius: 15px 5px 5px 15px; }
        .front img, .back img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Galería final del Corazón */
        #heartGallery {
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            z-index: 30; width: 100%; height: 100%; display: none;
            animation: heartbeat 1.2s infinite;
        }
        .heart-pic {
            position: absolute; top: 50%; left: 50%;
            width: 70px; height: 70px; border-radius: 50%; object-fit: cover;
            border: 3px solid #ff69b4; box-shadow: 0 0 15px rgba(255,105,180,0.8);
            transform: translate(-50%, -50%) scale(0); opacity: 0;
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes heartbeat {
            0% { transform: translate(-50%, -50%) scale(1); }
            15% { transform: translate(-50%, -50%) scale(1.08); }
            30% { transform: translate(-50%, -50%) scale(1); }
            45% { transform: translate(-50%, -50%) scale(1.08); }
            60% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        #clickHint {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; z-index: 30; font-family: 'Dancing Script', cursive;
            font-size: 24px; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>

    <canvas id="matrixCanvas"></canvas>
    <div id="textContainer"></div>
    <div id="clickHint">Haz clic en la pantalla para empezar 🎵</div>
    <div id="bookCaption">Un pequeño detalle para ti...</div>

    <div id="bookContainer">
        <div class="page" id="page3" style="z-index: 1;">
            <div class="front"><img src="foto5.jpg" alt="Foto 5"></div>
            <div class="back"><img src="foto6.jpg" alt="Foto 6"></div>
        </div>
        <div class="page" id="page2" style="z-index: 2;">
            <div class="front"><img src="foto3.jpg" alt="Foto 3"></div>
            <div class="back"><img src="foto4.jpg" alt="Foto 4"></div>
        </div>
        <div class="page" id="page1" style="z-index: 3;">
            <div class="front"><img src="foto1.jpg" alt="Foto 1"></div>
            <div class="back"><img src="foto2.jpg" alt="Foto 2"></div>
        </div>
    </div>

    <div id="heartGallery"></div>

    <audio id="bgMusic" src="Happybirthday.mp3" loop></audio>

    <script>
        // --- 1. CONFIGURACIÓN MATRIX ---
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const phrase = "FELIZCUMPLEAÑOSSARAI"; 
        const fontSize = 20;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff69b4";
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                // Aquí elegimos la letra basándonos en la posición de la gota
                // para que siempre escriba la frase en orden hacia abajo
                const charIndex = drops[i] % phrase.length;
                const text = phrase[charIndex];
                
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // --- RESTO DE LA LÓGICA (TEXTO, LIBRO Y CORAZÓN) ---
        const frases = [
            "Un pequeño detalle para ti...",
            "Por todos los momentos felices...",
            "Por tu sonrisa que ilumina todo...",
            "¡Que todos tus sueños se cumplan! ❤️"
        ];

        let isStarted = false;
        document.body.addEventListener('click', function() {
            if (!isStarted) {
                isStarted = true;
                document.getElementById('clickHint').style.display = 'none';
                document.getElementById('bgMusic').play().catch(e => console.log("Audio esperando"));
                startTextAnimation();
            }
        });

        function startTextAnimation() {
            let words = ["FELIZ", "CUMPLEAÑOS", "SARAI", "❤"];
            let textContainer = document.getElementById('textContainer');
            let i = 0;
            function showNextWord() {
                if (i < words.length) {
                    textContainer.innerText = words[i];
                    textContainer.style.opacity = 1;
                    setTimeout(() => {
                        textContainer.style.opacity = 0;
                        i++;
                        setTimeout(showNextWord, 500);
                    }, 1200);
                } else {
                    setTimeout(() => {
                        document.getElementById('bookContainer').style.display = 'block';
                        let caption = document.getElementById('bookCaption');
                        caption.style.display = 'block';
                        setTimeout(() => caption.style.opacity = 1, 100);
                    }, 500);
                }
            }
            showNextWord();
        }

        const pages = [document.getElementById('page1'), document.getElementById('page2'), document.getElementById('page3')];
        let captionEl = document.getElementById('bookCaption');

        pages.forEach((page, index) => {
            page.addEventListener('click', function() {
                if(this.classList.contains('flipped')) return; 
                this.classList.add('flipped');
                let flippedCount = document.querySelectorAll('.page.flipped').length;
                captionEl.style.opacity = 0; 
                setTimeout(() => {
                    captionEl.innerText = frases[flippedCount];
                    captionEl.style.opacity = 1;
                    if(flippedCount === 3) setTimeout(createHeartEnding, 2500); 
                }, 500);
            });
        });

        function createHeartEnding() {
            let book = document.getElementById('bookContainer');
            book.style.transition = "opacity 1.5s";
            book.style.opacity = 0;
            captionEl.style.opacity = 0;
            setTimeout(() => {
                book.style.display = "none";
                captionEl.style.display = "none";
                let gallery = document.getElementById('heartGallery');
                gallery.style.display = "block";
                let photos = ["foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg", "foto5.jpg", "foto6.jpg"];
                let totalPics = 18; 
                for (let i = 0; i < totalPics; i++) {
                    let img = document.createElement('img');
                    img.src = photos[i % photos.length];
                    img.className = 'heart-pic';
                    gallery.appendChild(img);
                    let t = (i / totalPics) * Math.PI * 2;
                    let scale = Math.min(window.innerWidth / 60, 13); 
                    let x = 16 * Math.pow(Math.sin(t), 3) * scale;
                    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * scale;
                    setTimeout(() => {
                        img.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1)`;
                        img.style.opacity = 1;
                    }, i * 200); 
                }
            }, 1500);
        }
    </script>
</body>
</html>
